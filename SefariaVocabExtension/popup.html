<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Flashcard Grabber</title>
        <style>
            body {
                width: 260px;
                padding: 15px;
                font-family: sans-serif;
                text-align: center;
            }

            h3 {
                margin-top: 0;
            }

            .word-item {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }

            .word-item .remove-btn {
                flex-shrink: 0;
                margin-right: 8px;
                padding: 2px 8px;
                font-size: 11px;
                color: white;
                background-color: #e53935;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }

            .word-item .remove-btn:hover {
                background-color: #c62828;
            }

            #word-count {
                font-size: 13px;
                color: #555;
                margin-bottom: 8px;
            }

            #word-list {
                list-style: none;
                padding: 0;
                margin: 0 0 12px 0;
                max-height: 200px;
                overflow-y: auto;
                border: 1px solid #d0d7de;
                border-radius: 8px;
                text-align: right;
                direction: rtl;
                background-color: #fff;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            }

            #word-list::-webkit-scrollbar {
                width: 5px;
            }

            #word-list::-webkit-scrollbar-track {
                background: transparent;
            }

            #word-list::-webkit-scrollbar-thumb {
                background: #c4c4c4;
                border-radius: 3px;
            }

            #word-list::-webkit-scrollbar-thumb:hover {
                background: #a0a0a0;
            }

            #word-list li {
                padding: 8px 12px;
                border-bottom: 1px solid #f0f0f0;
                font-size: 16px;
                font-family: "Heebo", "David", serif;
                color: #1a1a1a;
                letter-spacing: 0.01em;
                transition: background-color 0.15s ease;
            }

            #word-list li:hover {
                background-color: #f5f8ff;
            }

            #word-list li:last-child {
                border-bottom: none;
            }

            #word-list .empty-msg {
                color: #aaa;
                font-size: 13px;
                text-align: center;
                direction: ltr;
                font-family: sans-serif;
                padding: 14px 10px;
            }

            .btn {
                width: 100%;
                padding: 10px;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                margin-bottom: 8px;
                font-size: 14px;
            }

            #download {
                background-color: #4285f4;
            }

            #download:hover {
                background-color: #3367d6;
            }

            #clear {
                background-color: #e53935;
            }

            #clear:hover {
                background-color: #c62828;
            }
        </style>
    </head>
    <body>
        <h3>Flashcard Data</h3>
        <div id="word-count">Loading...</div>
        <ul id="word-list"></ul>
        <script src="popup.js"></script>
    </body>
</html>
